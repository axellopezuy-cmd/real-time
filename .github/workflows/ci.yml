name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install panel-browser deps
        run: cd panel-browser && npm ci

      - name: Run TypeScript tests
        run: cd panel-browser && npm test

      - name: Build panel-browser
        run: cd panel-browser && npm run build

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: realtime-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: realtime-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: realtime-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: realtime-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build panel-browser
        run: cd panel-browser && npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/realtime${{ matrix.os == 'windows-latest' && '.exe' || '' }}
