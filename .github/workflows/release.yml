name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: realtime-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: realtime-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: realtime-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: realtime-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build panel-browser
        run: cd panel-browser && npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/realtime ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/realtime.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for $TAG"
          gh release create "$TAG" \
            --title "Real Time $TAG" \
            --generate-notes \
            artifacts/realtime-linux-x64/realtime-linux-x64 \
            artifacts/realtime-macos-x64/realtime-macos-x64 \
            artifacts/realtime-macos-arm64/realtime-macos-arm64 \
            artifacts/realtime-windows-x64.exe/realtime-windows-x64.exe
